name: Build Escucha Clara APK

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build installable APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Escucha-Clara.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Escucha-Clara-APK
          path: Escucha-Clara.apk
          if-no-files-found: error
          retention-days: 30
